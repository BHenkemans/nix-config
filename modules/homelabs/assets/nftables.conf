table inet filter {
  chain input {
    type filter hook input priority filter; policy drop;

    iif "lo" accept

    ct state established,related accept
    ct state invalid drop

    ip saddr 192.168.0.0/16 tcp dport 22 accept
    ip saddr 10.0.0.0/8 tcp dport 22 accept

    # k3s API server
    ip saddr { 192.168.0.0/16, 10.0.0.0/8 } tcp dport 6443 accept

    # etcd (peer communication)
    ip saddr { 192.168.0.0/16, 10.0.0.0/8 } tcp dport { 2379, 2380 } accept

    # kubelet metrics
    ip saddr { 192.168.0.0/16, 10.0.0.0/8 } tcp dport 10250 accept

    # flannel VXLAN
    ip saddr { 192.168.0.0/16, 10.0.0.0/8 } udp dport 8472 accept

    icmp type echo-request accept
    icmpv6 type { echo-request, nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } accept
  }

  chain forward {
    type filter hook forward priority filter; policy accept;
  }

  chain output {
    type filter hook output priority filter; policy accept;
  }
}
